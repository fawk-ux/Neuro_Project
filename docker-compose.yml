services:
  eeg-api:
    build: .
    container_name: eeg-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - eeg-network

  eeg-dashboard:
    build: .
    container_name: eeg-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - API_URL=http://eeg-api:8000
    depends_on:
      eeg-api:
        condition: service_healthy
    networks:
      - eeg-network

networks:
  eeg-network:
    driver: bridge